<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Majestios — Login</title>
  <style>
    body { font-family: Arial; background: #0d0d0d; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-box { background: #1a1a1a; padding: 40px; border-radius: 10px; width: 350px; }
    input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; }
    button { width: 100%; padding: 12px; margin-top: 20px; background: #4a00ff; border: none; color: white; border-radius: 6px; cursor: pointer; }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Connexion</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
    </form>

    <p id="error" style="color: red; margin-top: 15px;"></p>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api/auth/login";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard.html"; // ta page Majestios
      } else {
        document.getElementById("error").innerText = data.message || "Erreur de connexion";
      }
    });
  </script>

</body>
</html>
