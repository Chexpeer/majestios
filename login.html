<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — M@jestiOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aura"></div>
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <a href="index.html" class="logo-text" style="justify-content: center; margin-bottom: 30px;">M@jest<span class="ios-highlight">iOS</span></a>
            <h2 style="margin-bottom: 30px;">Bon retour</h2>
            <form action="chat.html" style="text-align: left;">
                <input type="email" placeholder="Email" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box;">
                <input type="password" placeholder="Mot de passe" style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 20px; box-sizing: border-box;">
                <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">Se connecter</button>
            </form>
        </div>
    </div>
</body>
</html>
