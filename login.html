<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Connexion – M@jestiOS</title>
    <meta
      name="description"
      content="Connexion à M@jestiOS – Accédez à votre OS d’intelligences unifiées."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>

  <body>
    <div class="app-shell">

      <header class="app-header">
        <div class="app-header-inner">
          <a href="index.html" class="brand">
            <div class="brand-mark">M</div>
            <div class="brand-text">
              <div class="brand-name">M@jestiOS</div>
              <div class="brand-tagline">L’OS d’intelligences unifiées</div>
            </div>
          </a>
        </div>
      </header>

      <main class="app-main">

        <section class="section" style="padding-top: 60px">
          <div class="container" style="max-width: 420px; margin: 0 auto">

            <div class="card" style="padding: 30px">

              <h1 class="section-title" style="text-align: center; margin-bottom: 20px">
                Connexion
              </h1>

              <p class="section-subtitle" style="text-align: center; margin-bottom: 30px">
                Accédez à votre espace M@jestiOS.
              </p>

              <div id="errorBox" style="
                display: none;
                background: rgba(255,0,0,0.1);
                color: #ff4d4d;
                padding: 10px 14px;
                border-radius: 6px;
                margin-bottom: 16px;
                font-size: 14px;
              "></div>

              <form id="loginForm" class="form">

                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="email" required placeholder="vous@exemple.com" />
                </div>

                <div class="form-group" style="margin-top: 14px">
                  <label>Mot de passe</label>
                  <input type="password" id="password" required placeholder="••••••••" />
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px">
                  Se connecter
                </button>

              </form>

            </div>

          </div>
        </section>

      </main>

      <footer class="app-footer">
        <div class="app-footer-inner" style="text-align: center">
          © M@jestiOS – L’OS d’intelligences unifiées.
        </div>
      </footer>

    </div>

    <script src="assets/js/auth.js"></script>
  </body>
</html>
