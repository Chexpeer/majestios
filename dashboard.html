<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Majestios — Dashboard</title>
  <style>
    body { font-family: Arial; background: #0d0d0d; color: white; padding: 40px; }
    .box { background: #1a1a1a; padding: 30px; border-radius: 10px; max-width: 600px; margin: auto; }
    button { padding: 10px 20px; background: #ff0044; border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 20px; }
  </style>
</head>

<body>

  <div class="box">
    <h1>Bienvenue sur Majestios</h1>
    <p id="userInfo">Chargement...</p>

    <button id="logout">Se déconnecter</button>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api/auth/me";

    async function loadUser() {
      const token = localStorage.getItem("token");

      if (!token) {
        window.location.href = "/login.html";
        return;
      }

      const res = await fetch(API_URL, {
        method: "GET",
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      const data = await res.json();

      if (!data || !data.email) {
        window.location.href = "/login.html";
        return;
      }

      document.getElementById("userInfo").innerText =
        "Connecté en tant que : " + data.email;
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    });

    loadUser();
  </script>

</body>
</html>
