<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – M@jestiOS</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      width: 100%;
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #8a7bff;
    }

    .user-info {
      font-size: 14px;
      opacity: 0.8;
    }

    .logout-btn {
      margin-left: 20px;
      padding: 8px 14px;
      background: #ff4d4d;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .logout-btn:hover {
      opacity: 0.8;
    }

    /* CONTENT */
    .content {
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      opacity: 0.7;
    }
  </style>
</head>

<body onload="checkAuth()">

  <header>
    <div class="logo">M@jestiOS</div>

    <div class="user-info">
      Connecté en tant que : <span id="userEmail">Chargement...</span>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="content">
    <h1>Bienvenue sur votre Dashboard</h1>
    <p>Votre espace personnel est maintenant accessible.</p>
  </div>

  <script src="assets/js/auth.js"></script>

</body>
</html>
