<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil - Majestios</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 380px;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .info {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 6px;
      margin: 10px 0;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #ef4444;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #dc2626;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Mon Profil</h2>

    <div id="content">
      <p id="message">Chargement...</p>
    </div>

    <button onclick="logout()">Se déconnecter</button>
  </div>

  <script>
    async function loadProfile() {
      const token = localStorage.getItem("token");
      const message = document.getElementById("message");
      const content = document.getElementById("content");

      if (!token) {
        window.location.href = "login.html";   <!-- ⭐ Correction -->
        return;
      }

      try {
        const res = await fetch("https://majestios-backend.onrender.com/api/auth/me", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Erreur";
          return;
        }

        content.innerHTML = `
          <div class="info"><strong>Email :</strong> ${data.user.email}</div>
          <div class="info"><strong>Nom d'utilisateur :</strong> ${data.user.username}</div>
          <div class="info"><strong>ID :</strong> ${data.user._id}</div>
        `;

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur réseau";
      }
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";   <!-- ⭐ Correction -->
    }

    loadProfile();
  </script>

</body>
</html>
