<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>MajestiOS Chat – Intelligence unifiée</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>

  <body>
    <div class="app-shell">

      <!-- SIDEBAR -->
      <aside style="
        width: 240px;
        background: #0f172a;
        border-right: 1px solid rgba(148,163,184,0.15);
        position: fixed;
        inset: 0 auto 0 0;
        padding: 24px 18px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      ">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div class="brand-text">
            <div class="brand-name">MajestiOS</div>
            <div class="brand-tagline">Intelligence unifiée</div>
          </div>
        </div>

        <nav class="nav-links" style="flex-direction:column;gap:14px;margin-top:20px;">
          <a href="dashboard.html" class="nav-link"><span>Dashboard</span></a>
          <a href="workspaces.html" class="nav-link"><span>Mes espaces</span></a>
          <a href="app.html" class="nav-link nav-link-active"><span>MajestiOS Chat</span></a>
          <a href="historique.html" class="nav-link"><span>Historique</span></a>
          <a href="notifications.html" class="nav-link"><span>Notifications</span></a>
          <a href="settings.html" class="nav-link"><span>Paramètres</span></a>
          <a href="profile.html" class="nav-link"><span>Profil</span></a>
        </nav>

        <div style="margin-top:auto;">
          <div id="sidebarEmail" style="font-size:13px;opacity:0.7;margin-bottom:8px;"></div>
          <button onclick="logout()" class="btn btn-outline">Déconnexion</button>
        </div>
      </aside>

      <!-- CONTENU PRINCIPAL -->
      <main class="app-main" style="margin-left:240px;">

        <!-- BARRE IA -->
        <form class="ia-bar" style="
          max-width:600px;
          margin:32px auto;
          display:flex;
          align-items:center;
          gap:10px;
          padding:10px 16px;
          border-radius:999px;
          background:rgba(15,23,42,0.9);
          border:1px solid rgba(148,163,184,0.35);
        ">
          <span style="
            width:22px;height:22px;border-radius:999px;
            background:radial-gradient(circle at 30% 30%, #22c55e, #4f46e5);
          ">✦</span>

          <input id="mainPrompt" type="text" placeholder="Demandez à MajestiOS Intelligence…" style="
            flex:1;border:none;background:transparent;color:#e5e7eb;font-size:14px;outline:none;
          " />

          <button id="mainSend" type="button" class="btn btn-primary" style="border-radius:999px;padding:6px 16px;">
            Lancer
          </button>
        </form>

        <!-- CHAT -->
        <section class="section">
          <div class="container" style="max-width:900px;">

            <div class="section-header" style="text-align:center;">
              <div class="section-eyebrow">MajestiOS Intelligence</div>
              <h1 class="section-title">Votre espace de conversation</h1>
              <p class="section-subtitle">
                Une seule IA. Une seule interface. Une intelligence unifiée.
              </p>
            </div>

            <div class="card" style="padding:24px;">

              <!-- Chat -->
              <div id="chatBox" style="
                height:480px;
                overflow-y:auto;
                padding:14px;
                border-radius:14px;
                background:rgba(15,23,42,0.9);
                border:1px solid rgba(31,41,55,0.9);
                display:flex;
                flex-direction:column;
                gap:12px;
              ">
                <div style="opacity:0.6;font-size:13px;">MajestiOS est prêt à vous aider.</div>
              </div>

              <!-- Input -->
              <form id="chatForm" style="margin-top:16px;display:flex;gap:10px;">
                <input id="chatInput" type="text" class="input" placeholder="Votre message…" style="flex:1;" required />
                <button class="btn btn-primary">Envoyer</button>
              </form>

            </div>

          </div>
        </section>

      </main>

      <footer class="app-footer">
        <div class="app-footer-inner">
          <div>© MajestiOS – Intelligence unifiée.</div>
        </div>
      </footer>

    </div>

    <!-- JS -->
    <script type="module">
      import { checkAuth } from "./assets/js/auth.js";

      async function initApp() {
        const user = await checkAuth();
        if (!user) return;

        const chatBox = document.getElementById("chatBox");
        const chatForm = document.getElementById("chatForm");
        const chatInput = document.getElementById("chatInput");

        // Effet "MajestiOS réfléchit…"
        function thinking() {
          const el = document.createElement("div");
          el.className = "hero-msg hero-msg-ai";
          el.id = "thinking";
          el.textContent = "MajestiOS réfléchit…";
          chatBox.appendChild(el);
          chatBox.scrollTop = chatBox.scrollHeight;
        }

        function stopThinking() {
          const el = document.getElementById("thinking");
          if (el) el.remove();
        }

        // Envoi message
        chatForm.addEventListener("submit", async e => {
          e.preventDefault();

          const prompt = chatInput.value.trim();
          if (!prompt) return;

          // Affichage utilisateur
          chatBox.innerHTML += `<div class="hero-msg hero-msg-user">${prompt}</div>`;
          chatInput.value = "";
          chatBox.scrollTop = chatBox.scrollHeight;

          thinking();

          const token = localStorage.getItem("token");

          // Appel MajestiOS Intelligence
          const res = await fetch("https://majestios-backend.onrender.com/api/ai/route", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token
            },
            body: JSON.stringify({
              prompt,
              strategy: "balanced"
            })
          });

          const data = await res.json();
          stopThinking();

          const answer = data.response || "Erreur : aucune réponse.";

          // Affichage IA
          chatBox.innerHTML += `
            <div class="hero-msg hero-msg-ai">
              ${answer}<br><br>
              <span style="opacity:0.6;font-size:12px;">— MajestiOS Intelligence</span>
            </div>
          `;
          chatBox.scrollTop = chatBox.scrollHeight;

          // Historique
          await fetch("https://majestios-backend.onrender.com/api/user/history/add", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token
            },
            body: JSON.stringify({ prompt, response: answer })
          });
        });

        // Barre IA centrale → envoie dans le chat
        document.getElementById("mainSend").onclick = () => {
          const value = document.getElementById("mainPrompt").value.trim();
          if (value) {
            chatInput.value = value;
            chatForm.dispatchEvent(new Event("submit"));
          }
        };
      }

      document.addEventListener("DOMContentLoaded", initApp);
    </script>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/analytics.js"></script>
  </body>
</html>
