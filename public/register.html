<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte – M@jestiOS</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: #111;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      border: 1px solid #222;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    .login-subtitle {
      font-size: 15px;
      opacity: 0.7;
      text-align: center;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 15px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #6a5acd;
      outline: none;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6a5acd, #8a7bff);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
    }

    .login-footer a {
      color: #8a7bff;
      text-decoration: none;
      font-weight: 600;
    }

    .error-box,
    .success-box {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .error-box {
      background: rgba(255, 0, 0, 0.15);
      border: 1px solid #ff4d4d;
      color: #ff6b6b;
    }

    .success-box {
      background: rgba(0, 255, 120, 0.15);
      border: 1px solid #00ff88;
      color: #00ff88;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <h1 class="login-title">Créer un compte</h1>
    <p class="login-subtitle">Rejoignez l’écosystème M@jestiOS</p>

    <div id="errorBox" class="error-box"></div>
    <div id="successBox" class="success-box"></div>

    <form id="registerForm" class="login-form">

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="exemple@mail.com" required>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Votre mot de passe" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="Confirmez le mot de passe" required>
      </div>

      <button type="submit" class="btn-login">Créer mon compte</button>

    </form>

    <p class="login-footer">
      Déjà un compte ?
      <a href="login.html">Se connecter</a>
    </p>

  </div>

  <script>
    const API_URL = "https://majestios-backend.onrender.com/api/auth/register";

    const form = document.getElementById("registerForm");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      errorBox.style.display = "none";
      successBox.style.display = "none";

      if (password !== confirmPassword) {
        errorBox.innerText = "Les mots de passe ne correspondent pas.";
        errorBox.style.display = "block";
        return;
      }

      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        successBox.innerText = "Compte créé avec succès ! Redirection...";
        successBox.style.display = "block";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } else {
        errorBox.innerText = data.message || "Erreur lors de la création du compte.";
        errorBox.style.display = "block";
      }
    });
  </script>

</body>
</html>
