<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paramètres – Majestios</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 420px;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .info {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 6px;
      margin: 10px 0;
      font-size: 15px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #4f46e5;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .danger-btn {
      background: #ef4444;
      margin-top: 10px;
    }

    .danger-btn:hover {
      background: #dc2626;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Paramètres du compte</h2>

    <div id="content">
      <p id="message">Chargement...</p>
    </div>

    <button onclick="logout()" class="danger-btn">Se déconnecter</button>
  </div>

  <script>
    async function loadSettings() {
      const token = localStorage.getItem("token");
      const message = document.getElementById("message");
      const content = document.getElementById("content");

      if (!token) {
        window.location.href = "login.html";  // ⭐ Correction
        return;
      }

      try {
        const res = await fetch("https://majestios-backend.onrender.com/api/auth/me", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Erreur";
          return;
        }

        content.innerHTML = `
          <div class="info"><strong>Email :</strong> ${data.user.email}</div>
          <div class="info"><strong>Nom d'utilisateur :</strong> ${data.user.username}</div>

          <label>Nouveau nom d'utilisateur</label>
          <input id="newUsername" type="text" placeholder="Modifier le nom d'utilisateur" />

          <label>Nouveau mot de passe</label>
          <input id="newPassword" type="password" placeholder="Modifier le mot de passe" />

          <button onclick="updateSettings()">Mettre à jour</button>
        `;

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur réseau";
      }
    }

    async function updateSettings() {
      const token = localStorage.getItem("token");
      const newUsername = document.getElementById("newUsername").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const message = document.getElementById("message");

      const body = {};
      if (newUsername) body.username = newUsername;
      if (newPassword) body.password = newPassword;

      if (Object.keys(body).length === 0) {
        message.textContent = "Aucune modification.";
        return;
      }

      try {
        const res = await fetch("https://majestios-backend.onrender.com/api/auth/update", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Erreur";
          return;
        }

        message.textContent = "Modifications enregistrées.";
        loadSettings();

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur réseau";
      }
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";  // ⭐ Correction
    }

    loadSettings();
  </script>

</body>
</html>
