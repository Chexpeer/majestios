<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Historique – MajestiOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- CSS EXISTANTS -->
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>

  <body>
    <div class="app-shell">

      <!-- SIDEBAR -->
      <aside style="
        width: 240px;
        background: #0f172a;
        border-right: 1px solid rgba(148,163,184,0.15);
        position: fixed;
        inset: 0 auto 0 0;
        padding: 24px 18px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      ">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div class="brand-text">
            <div class="brand-name">MajestiOS</div>
            <div class="brand-tagline">Intelligence unifiée</div>
          </div>
        </div>

        <nav class="nav-links" style="flex-direction:column;gap:14px;margin-top:20px;">
          <a href="dashboard.html" class="nav-link"><span>Dashboard</span></a>
          <a href="workspaces.html" class="nav-link"><span>Mes espaces</span></a>
          <a href="app.html" class="nav-link"><span>MajestiOS Chat</span></a>
          <a href="historique.html" class="nav-link nav-link-active"><span>Historique</span></a>
          <a href="notifications.html" class="nav-link"><span>Notifications</span></a>
          <a href="settings.html" class="nav-link"><span>Paramètres</span></a>
          <a href="profile.html" class="nav-link"><span>Profil</span></a>
        </nav>

        <div style="margin-top:auto;">
          <div id="sidebarEmail" style="font-size:13px;opacity:0.7;margin-bottom:8px;"></div>
          <button onclick="logout()" class="btn btn-outline">Déconnexion</button>
        </div>
      </aside>

      <!-- CONTENU PRINCIPAL -->
      <main class="app-main" style="margin-left:240px;">

        <!-- BARRE IA -->
        <form class="ia-bar" action="app.html" method="GET" style="
          max-width:600px;
          margin:32px auto;
          display:flex;
          align-items:center;
          gap:10px;
          padding:10px 16px;
          border-radius:999px;
          background:rgba(15,23,42,0.9);
          border:1px solid rgba(148,163,184,0.35);
        ">
          <span style="
            width:22px;height:22px;border-radius:999px;
            background:radial-gradient(circle at 30% 30%, #22c55e, #4f46e5);
          ">✦</span>

          <input type="text" name="prompt" placeholder="Rechercher dans l’historique…" style="
            flex:1;border:none;background:transparent;color:#e5e7eb;font-size:14px;outline:none;
          " />

          <button type="submit" class="btn btn-primary" style="border-radius:999px;padding:6px 16px;">
            Chercher
          </button>
        </form>

        <!-- HISTORIQUE -->
        <section class="section">
          <div class="container" style="max-width:820px;">

            <div class="section-header" style="text-align:center;">
              <div class="section-eyebrow">Historique</div>
              <h1 class="section-title">Vos interactions avec MajestiOS</h1>
              <p class="section-subtitle">
                Retrouvez toutes vos requêtes traitées par MajestiOS Intelligence.
              </p>
            </div>

            <div class="card" style="padding:24px;">
              <h3 class="card-title" style="margin-bottom:16px;">Historique complet</h3>

              <div id="historyList" class="list">
                <div class="list-item">
                  <div class="list-bullet">•</div>
                  <div>Chargement…</div>
                </div>
              </div>

            </div>

          </div>
        </section>

      </main>

      <footer class="app-footer">
        <div class="app-footer-inner">
          <div>© MajestiOS – Intelligence unifiée.</div>
        </div>
      </footer>

    </div>

    <!-- JS -->
    <script type="module">
      import { checkAuth } from "./assets/js/auth.js";

      async function initHistory() {
        const user = await checkAuth();
        if (!user) return;

        const token = localStorage.getItem("token");
        const list = document.getElementById("historyList");

        try {
          const res = await fetch("https://majestios-backend.onrender.com/api/user/history", {
            headers: { Authorization: "Bearer " + token }
          });

          const data = await res.json();

          if (!data.items || data.items.length === 0) {
            list.innerHTML = `
              <div class="list-item">
                <div class="list-bullet">•</div>
                <div>Aucun historique pour le moment.</div>
              </div>
            `;
            return;
          }

          list.innerHTML = data.items
            .map(item => `
              <div class="list-item">
                <div class="list-bullet">•</div>
                <div>
                  <strong>${item.prompt.slice(0, 80)}${item.prompt.length > 80 ? "…" : ""}</strong><br>
                  <span style="font-size:12px;opacity:0.6;">${new Date(item.date).toLocaleString()}</span>
                </div>
              </div>
            `)
            .join("");

        } catch (err) {
          list.innerHTML = `
            <div class="list-item">
              <div class="list-bullet">•</div>
              <div>Erreur lors du chargement.</div>
            </div>
          `;
        }
      }

      document.addEventListener("DOMContentLoaded", initHistory);
    </script>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/analytics.js"></script>
  </body>
</html>
