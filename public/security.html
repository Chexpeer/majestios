<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sécurité - Majestios</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
    }

    .topbar {
      width: 100%;
      padding: 15px 25px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .logout-btn {
      background: #ef4444;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .container {
      padding: 30px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .info {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 6px;
      margin: 8px 0;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 15px;
    }

    button.save-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #4f46e5;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.save-btn:hover {
      background: #4338ca;
    }

    #message {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <h1>Sécurité du compte</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="container">

    <div class="card">
      <h2>Informations sensibles</h2>
      <div id="user-info">
        <p id="message">Chargement...</p>
      </div>
    </div>

    <div class="card">
      <h2>Changer mon email</h2>
      <input id="new-email" type="email" placeholder="Nouvel email" />
      <button class="save-btn" onclick="updateEmail()">Mettre à jour l'email</button>
    </div>

    <div class="card">
      <h2>Changer mon nom d'utilisateur</h2>
      <input id="new-username" type="text" placeholder="Nouveau nom d'utilisateur" />
      <button class="save-btn" onclick="updateUsername()">Mettre à jour le nom d'utilisateur</button>
    </div>

    <div class="card">
      <h2>Changer mon mot de passe</h2>
      <input id="new-password" type="password" placeholder="Nouveau mot de passe" />
      <button class="save-btn" onclick="updatePassword()">Mettre à jour le mot de passe</button>
    </div>

  </div>

  <script>
    const API = "https://majestios-backend.onrender.com/api/auth";

    async function loadSecurity() {
      const token = localStorage.getItem("token");
      const message = document.getElementById("message");
      const userInfo = document.getElementById("user-info");

      if (!token) {
        window.location.href = "/login.html";
        return;
      }

      try {
        const res = await fetch(`${API}/me`, {
          method: "GET",
          headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Erreur";
          return;
        }

        userInfo.innerHTML = `
          <div class="info"><strong>Email :</strong> ${data.user.email}</div>
          <div class="info"><strong>Nom d'utilisateur :</strong> ${data.user.username}</div>
          <div class="info"><strong>ID :</strong> ${data.user._id}</div>
        `;

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur réseau";
      }
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    }

    async function updateEmail() {
      const token = localStorage.getItem("token");
      const newEmail = document.getElementById("new-email").value.trim();
      const message = document.getElementById("message");

      if (!newEmail) return message.textContent = "Veuillez entrer un email";

      const res = await fetch(`${API}/update-email`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ newEmail })
      });

      const data = await res.json();
      message.textContent = data.message;
      loadSecurity();
    }

    async function updateUsername() {
      const token = localStorage.getItem("token");
      const newUsername = document.getElementById("new-username").value.trim();
      const message = document.getElementById("message");

      if (!newUsername) return message.textContent = "Veuillez entrer un nom d'utilisateur";

      const res = await fetch(`${API}/update-username`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ newUsername })
      });

      const data = await res.json();
      message.textContent = data.message;
      loadSecurity();
    }

    async function updatePassword() {
      const token = localStorage.getItem("token");
      const newPassword = document.getElementById("new-password").value.trim();
      const message = document.getElementById("message");

      if (!newPassword) return message.textContent = "Veuillez entrer un mot de passe";

      const res = await fetch(`${API}/update-password`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ newPassword })
      });

      const data = await res.json();
      message.textContent = data.message;
    }

    loadSecurity();
  </script>

</body>
</html>
