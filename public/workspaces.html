<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Workspaces – M@jestiOS</title>
    <meta name="description" content="Gérez vos workspaces M@jestiOS." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <style>
      /* Style pour le menu déroulant */
      .nav-dropdown { position: relative; display: inline-block; }
      #workspace-submenu {
        display: none;
        position: absolute;
        background: #1a1a1a;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
        z-index: 1000;
        padding: 10px;
        border-radius: 8px;
        list-style: none;
        margin-top: 5px;
      }
      .nav-dropdown:hover #workspace-submenu { display: block; }
    </style>
  </head>

  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-header-inner">
          <a href="index.html" class="brand">
            <div class="brand-mark">M</div>
            <div class="brand-text">
              <div class="brand-name">M@jestiOS</div>
            </div>
          </a>

          <nav class="nav">
            <div class="nav-links">
              <a href="dashboard.html" class="nav-link"><span>Tableau de bord</span></a>
              
              <div class="nav-dropdown">
                <a href="#" class="nav-link"><span>Mes Espaces ▾</span></a>
                <ul id="workspace-submenu">
                  </ul>
              </div>

              <a href="features.html" class="nav-link"><span>Fonctionnalités</span></a>
            </div>

            <div class="nav-cta">
              <span id="userEmail" style="margin-right: 12px; opacity: 0.8"></span>
              <button id="logoutBtn" class="btn btn-outline">Déconnexion</button>
            </div>
          </nav>
        </div>
      </header>

      <main class="app-main">
        <section class="section" style="padding-top: 40px">
          <div class="container">
            <div class="section-header" style="text-align: center; max-width: 720px; margin: 0 auto 40px">
              <h1 class="section-title">Vos espaces de travail.</h1>
            </div>

            <div class="card" style="max-width: 480px; margin: 0 auto 40px">
              <div class="card-title">Créer un workspace</div>
              <form id="workspaceForm" style="margin-top: 16px">
                <input type="text" id="workspaceName" class="input" placeholder="Nom du workspace" required />
                <button type="submit" class="btn btn-primary" style="margin-top: 12px">Créer</button>
              </form>
              <p id="message" style="margin-top: 10px; font-size: 14px; text-align: center; opacity: 0.85"></p>
            </div>

            <div class="grid-2" id="workspaceList">
              </div>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <div class="app-footer-inner">
          <div>© M@jestiOS</div>
        </div>
      </footer>
    </div>

    <script type="module" src="assets/js/workspaces.js"></script>
  </body>
</html>
