<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Majestios — Connexion</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      background: #1a1a1a;
      padding: 40px;
      width: 380px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin: 0 0 20px 0;
      text-align: center;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #4a00ff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .link a {
      color: #4a00ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Connexion</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
    </form>

    <p id="error" style="color: red; margin-top: 15px;"></p>

    <div class="link">
      Pas encore de compte ?  
      <a href="/register.html">Créer un compte</a>
    </div>
  </div>

  <script>
    const API_URL = "https://majestios-backend.onrender.com/api/auth/login";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard.html";
      } else {
        document.getElementById("error").innerText = data.message || "Erreur de connexion";
      }
    });
  </script>

</body>
</html>
