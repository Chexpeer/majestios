<script>
  async function loginUser() {
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const message = document.getElementById("message");

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    // Empêche l’auto-remplissage de tromper le JS
    emailInput.setAttribute("autocomplete", "off");
    passwordInput.setAttribute("autocomplete", "off");

    if (!email || !password) {
      message.textContent = "Veuillez remplir tous les champs.";
      return;
    }

    message.textContent = "Connexion en cours...";

    try {
      const res = await fetch("https://majestios-backend.onrender.com/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        message.textContent = data.message || "Identifiants incorrects.";
        return;
      }

      if (!data.token) {
        message.textContent = "Erreur : aucun token reçu.";
        return;
      }

      // Stockage du token
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));

      // Redirection
      window.location.href = "workspaces.html";

    } catch (err) {
      console.error(err);
      message.textContent = "Erreur réseau.";
    }
  }
</script>
