<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Majestios</title>
  <style>
    body { margin: 0; padding: 0; background: #0d0d0d; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { width: 350px; background: #1a1a1a; padding: 25px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
    h2 { text-align: center; margin-bottom: 20px; font-weight: 600; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; background: #2a2a2a; color: white; font-size: 15px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 10px; background: #4f46e5; border: none; border-radius: 6px; color: white; font-size: 16px; cursor: pointer; transition: 0.2s; }
    button:hover { background: #4338ca; }
    #message { margin-top: 15px; text-align: center; font-size: 14px; }
    .register-link { display: block; text-align: center; margin-top: 15px; color: #4f46e5; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Connexion</h2>
    <input id="email" type="email" placeholder="Adresse email" required />
    <input id="password" type="password" placeholder="Mot de passe" required />
    <button onclick="loginUser()">Se connecter</button>
    <a href="register.html" class="register-link">Pas de compte ? S'inscrire</a>
    <p id="message"></p>
  </div>

  <script>
    async function loginUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (!email || !password) {
        message.textContent = "Veuillez remplir tous les champs.";
        message.style.color = "#ef4444";
        return;
      }

      message.textContent = "Connexion...";
      message.style.color = "white";

      try {
        const res = await fetch("https://majestios-backend.onrender.com/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          // Sauvegarde du token pour rester connecté
          localStorage.setItem("token", data.token);
          message.style.color = "#10b981";
          message.textContent = "Succès ! Redirection...";
          setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
        } else {
          message.style.color = "#ef4444";
          message.textContent = data.message || "Email ou mot de passe incorrect";
        }
      } catch (err) {
        message.style.color = "#ef4444";
        message.textContent = "Erreur réseau";
      }
    }
  </script>
</body>
</html>
