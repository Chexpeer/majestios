<!DOCTYP html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Majestios</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 350px;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #4f46e5;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Connexion</h2>

    <input id="email" type="email" placeholder="Adresse email" />
    <input id="password" type="password" placeholder="Mot de passe" />

    <button onclick="loginUser()">Se connecter</button>

    <p style="text-align:center; margin-top:15px; font-size:14px;">
      Pas encore de compte ?
    </p>

    <button onclick="window.location.href='register.html'" 
            style="background:#2563eb; margin-top:5px;">
      Créer un compte
    </button>

    <p id="message"></p>
  </div>

  <script>
    async function loginUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      message.textContent = "Chargement...";

      try {
        const res = await fetch("https://majestios-backend.onrender.com/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        message.textContent = data.message;

        if (data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "workspaces.html";

        }

      } catch (err) {
        console.error(err);
        message.textContent = "Erreur réseau";
      }
    }
  </script>

</body>
</html>
