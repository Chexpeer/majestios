<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Créer un compte – M@jestiOS</title>
    <meta
      name="description"
      content="Créer un compte M@jestiOS : accédez à votre espace multi‑IA sécurisé."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />

    <style>
      .auth-container {
        max-width: 420px;
        margin: 0 auto;
        padding: 40px 0;
      }
      .auth-card {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 32px;
      }
      .auth-title {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 6px;
        text-align: center;
      }
      .auth-subtitle {
        text-align: center;
        opacity: 0.7;
        margin-bottom: 26px;
      }
      .auth-input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.03);
        color: white;
        margin-bottom: 16px;
      }
      .auth-input:focus {
        outline: none;
        border-color: rgba(255,255,255,0.3);
      }
      .auth-footer {
        text-align: center;
        margin-top: 20px;
        opacity: 0.7;
      }
      .auth-footer a {
        color: #fff;
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="app-shell">

      <header class="app-header">
        <div class="app-header-inner">
          <a href="index.html" class="brand">
            <div class="brand-mark">M</div>
            <div class="brand-text">
              <div class="brand-name">M@jestiOS</div>
              <div class="brand-tagline">L’OS d’intelligences unifiées</div>
            </div>
          </a>
        </div>
      </header>

      <main class="app-main">

        <section class="section">
          <div class="container">

            <div class="auth-container">

              <div class="auth-card">

                <h1 class="auth-title">Créer un compte</h1>
                <p class="auth-subtitle">Rejoignez l’OS d’intelligences unifiées.</p>

                <form>

                  <input
                    type="text"
                    class="auth-input"
                    placeholder="Nom complet"
                    required
                  />

                  <input
                    type="email"
                    class="auth-input"
                    placeholder="Adresse email"
                    required
                  />

                  <input
                    type="password"
                    class="auth-input"
                    placeholder="Mot de passe"
                    required
                  />

                  <button class="btn btn-primary" style="width: 100%; margin-top: 6px">
                    Créer mon compte
                  </button>

                </form>

                <div class="auth-footer" style="margin-top: 22px">
                  <div>
                    Déjà un compte ?
                    <a href="login.html">Se connecter</a>
                  </div>
                </div>

              </div>

            </div>

          </div>
        </section>

      </main>

      <footer class="app-footer">
        <div class="app-footer-inner">
          <div>© M@jestiOS – L’OS d’intelligences unifiées.</div>
          <div class="footer-links">
            <a href="mentions-legales.html" class="footer-link">Mentions légales</a>
            <a href="privacy.html" class="footer-link">Confidentialité</a>
            <a href="cookies.html" class="footer-link">Cookies</a>
            <a href="cgu.html" class="footer-link">CGU</a>
            <a href="cgv.html" class="footer-link">CGV</a>
          </div>
        </div>
      </footer>

    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/theme.js"></script>
  </body>
</html>
